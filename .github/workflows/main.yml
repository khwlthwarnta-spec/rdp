name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          # Enable Remote Desktop and disable Network Level Authentication
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          # Remove old rule if exists
          netsh advfirewall firewall delete rule name="RDP-Tailscale" | Out-Null
          
          # Allow RDP on port 3389
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389 | Out-Null

          Restart-Service -Name TermService -Force -ErrorAction SilentlyContinue

      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security
          
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126))
          }
          
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -ErrorAction Stop
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          
          echo "RDP_CREDS=User: RDP | Password: $password" >> $env:GITHUB_ENV
          
          Write-Host "RDP User created successfully."
          Write-Host "Username: RDP"
          Write-Host "Password: $password"

      - name: Install Tailscale
        shell: powershell
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-amd64.msi"
          $installerPath = Join-Path $env:TEMP "tailscale.msi"
          
          Write-Host "Downloading Tailscale..."
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath -UseBasicParsing
          
          Write-Host "Installing Tailscale..."
          $process = Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait -PassThru
          
          if ($process.ExitCode -eq 0) {
              Write-Host "Tailscale installed successfully."
          } else {
              Write-Error "Tailscale installation failed with exit code $($process.ExitCode)"
              exit 1
          }
          
          Remove-Item $installerPath -Force -ErrorAction SilentlyContinue

      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-runner-$env:GITHUB_RUN_ID `
            --accept-routes=true `
            --accept-dns=true

          # Wait and get Tailscale IP
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 15) {
              Start-Sleep -Seconds 6
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              $retries++
          }
          
          if (-not $tsIP) {
              Write-Error "Failed to get Tailscale IP after multiple attempts."
              exit 1
          }
          
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "Tailscale IP: $tsIP"

      - name: Verify RDP Accessibility
        run: |
          $test = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if ($test.TcpTestSucceeded) {
              Write-Host "✅ RDP is accessible on Tailscale IP: $env:TAILSCALE_IP"
          } else {
              Write-Error "❌ RDP port 3389 is not accessible"
              exit 1
          }

      - name: Maintain Connection & Show Credentials
        run: |
          Write-Host "`n════════════════════════════════════" -ForegroundColor Green
          Write-Host "          RDP ACCESS DETAILS" -ForegroundColor Green
          Write-Host "════════════════════════════════════" -ForegroundColor Green
          Write-Host "Address   : $env:TAILSCALE_IP" -ForegroundColor Cyan
          Write-Host "Username  : RDP" -ForegroundColor Cyan
          Write-Host "Password  : $(echo $env:RDP_CREDS)" -ForegroundColor Cyan
          Write-Host "════════════════════════════════════`n" -ForegroundColor Green
          
          Write-Host "Workflow will stay active until manually cancelled.`n"
          
          # Keep the runner alive
          while ($true) {
              Start-Sleep -Seconds 300
          }
